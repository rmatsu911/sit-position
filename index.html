<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宴会座席抽選</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <main class="page page-main">
    <header class="hero">
      <p class="page-kicker">Seating lottery</p>
      <h1>座席抽選</h1>
      <p>管理者が抽選を開始すると、この画面に同じ結果が表示されます。</p>
    </header>

    <section class="viewer-panel" aria-label="抽選状態">
      <div class="viewer-status">
        <span class="status-dot" aria-hidden="true"></span>
        <p id="statusText">抽選画面の準備を確認しています...</p>
      </div>
      <button id="refreshButton" class="button button-secondary" type="button">最新を確認</button>
    </section>

    <section class="grid-container" id="seatGrid" aria-label="座席表"></section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
